<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>討論區 - Exam Archive</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="app-shell">
        <header class="app-header">
            <div>
                <p class="eyebrow">Exam Archive</p>
                <h1>討論區</h1>
            </div>
            <div class="user-bar">
                <span id="currentUserText">尚未登入</span>
                <a class="button ghost small" href="myfiles.html">回我的考古題</a>
            </div>
        </header>

        <section class="panel">
            <div class="section-head">
                <div>
                    <h2>選擇考古題以參與討論</h2>
                </div>
                <select 
                    id="fileCourseSelect"
                    class="button ghost small">
                    <option value="">
                        請選擇一個課程
                    </option>
                </select>
                <!-- <button id="openJoinCourseModal" class="button small primary">
                    申請加入課程
                </button> -->
            </div>

            <div class="file-layout">
                <div class="file-list" id="fileList">
                    <p class="muted">請選擇一個科目</p>
                </div>

                <article class="file-detail" id="discussionDetail">
                    <div class="empty-state">
                        <h3>選擇一份考古題</h3>
                        <p>點選左側列表後，題目與討論內容會顯示在這裡。</p>
                    </div>
                </article>
            </div>
            
            <p class="status" id="filesStatus"></p>
        </section>
        
        <div id="joinCourseModal" class="modal hidden">
            <div class="modal-content">
        
                <div class="modal-header">
                    <h3>選擇要加入的課程</h3>
                    <button id="closeJoinCourseModalBtn">✕</button>
                </div>
        
                <select id="joinCourseSelect"></select>
        
                <div style="display:flex; justify-content:center; margin-top:20px;">
                    <button id="confirmJoinCourseBtn" class="button primary small">
                        確認申請
                    </button>
                </div>
        
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/session.js"></script>
    <script src="js/discussion.js"></script>
</body>
</html>
