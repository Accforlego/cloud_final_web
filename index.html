<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Exam Archive</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="home">
        <section class="hero-card">
            <p class="eyebrow">Exam Archive</p>
            <h1>Exam Archive</h1>
            <p class="hero-text">
                Sign in with Amazon Cognito to upload, review, and manage exam files.
            </p>

            <div class="form-grid">
                <button type="button" class="button primary" id="loginBtn">Sign in</button>
                <button type="button" class="button ghost" id="registerBtn">Create account</button>
            </div>

            <p class="status" id="authStatus"></p>
        </section>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
