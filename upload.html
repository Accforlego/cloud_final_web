<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>上傳考古題</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="app-shell">
        <header class="app-header">
            <div>
                <p class="eyebrow">Exam Archive</p>
                <h1>上傳考古題</h1>
            </div>

            <div class="user-bar">
                <span id="currentUserText">尚未登入</span>
                <button type="button" class="button ghost small" id="logoutBtn">登出</button>
            </div>
        </header>

        <nav class="page-nav">
            <a class="nav-link" href="myfiles.html">我的考古題</a>
            <a class="nav-link is-active" href="upload.html">上傳考古題</a>
            <a class="nav-link" href="discussion.html">討論區</a>
        </nav>

        <section class="panel" id="uploadPanel">
            <h2>選擇上傳內容</h2>

            <div class="form-grid two-columns">
                <label>
                    課程
                    <select id="courseSelect"></select>
                </label>

                <label>
                    類型
                    <select id="fileCategory">
                        <option value="image">圖片</option>
                        <option value="handwriting">手寫答案</option>
                        <option value="camera">拍照</option>
                        <option value="pdf">PDF</option>
                    </select>
                </label>
            </div>

            <div class="upload-box" id="uploadBox">
                <div id="fileUploadArea">
                    <input id="fileInput" type="file" accept=".png,.jpg,.jpeg,.pdf">
                    <p id="fileName">尚未選擇檔案</p>
                </div>

                <div class="handwriting-area" id="handwritingArea" hidden>
                    <canvas id="handwritingCanvas" aria-label="手寫答案區"></canvas>
                    <div class="handwriting-actions">
                        <button type="button" class="button ghost small" id="clearCanvasBtn">清除</button>
                    </div>
                </div>

                <div class="camera-area" id="cameraArea" hidden>
                    <video id="cameraPreview" autoplay muted playsinline></video>
                    <canvas id="cameraCanvas" hidden></canvas>
                    <div class="camera-actions">
                        <button type="button" class="button ghost small" id="startCameraBtn">開啟相機</button>
                        <button type="button" class="button primary small" id="capturePhotoBtn">拍照</button>
                        <button type="button" class="button ghost small" id="retakePhotoBtn" disabled>重拍</button>
                    </div>
                </div>
            </div>

            <button type="button" class="button primary" id="uploadBtn">上傳並辨識</button>
            <p class="status" id="uploadStatus"></p>
        </section>

        <section class="panel" id="reviewPanel" hidden>
            <div class="review-header">
                <div>
                    <h2>確認文字內容</h2>
                    <p>你可以直接修改辨識結果，確認後會儲存為正式文字。</p>
                </div>

                <span class="badge" id="reviewBadge">等待結果</span>
            </div>

            <textarea id="correctedText" rows="12" placeholder="辨識結果會顯示在這裡"></textarea>

            <div class="actions-row">
                <button type="button" class="button ghost" id="refreshOcrBtn">重新整理</button>
                <button type="button" class="button primary" id="confirmBtn">確認儲存</button>
            </div>

            <p class="status" id="reviewStatus"></p>
        </section>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
<script src="js/session.js"></script>
    <script src="js/upload.js"></script>
</body>
</html>
